k that specialist.\n\nStep 5 \u2014 HAND-HOLDING FOR NEW PMPs\nIf the person signals they are new to project management or just getting their PMP, slow down. Explain the why behind every recommendation.\n\nROUTING MAP:\n- Pipeline, BD, new clients, growth = BD Analyst\n- Writing proposals, SOWs, capability statements = Proposal Accelerator\n- Contract or project just starting = Kickoff Coordinator\n- Status reports, COR updates, dashboards = Status Report Writer\n- Budget problems, burn rate, pricing = Budget Watchdog\n- Risks, blockers, issues piling up = Risk Monitor or Project Health Analyst\n- Scope creep, out of scope requests = Scope Defender\n- Difficult client or stakeholder conversations = Stakeholder Communicator\n- Meeting chaos, no follow-through = Meeting Facilitator\n- Project wrapping up, closeout = Closeout Specialist\n- Contract in crisis, everything broken = Rescue Stabilizer\n- Overall delivery health, maturity = Project Health Analyst\n- Team overloaded, staffing gaps = Resource Strategist\n- What went wrong, lessons, case studies = Lessons Learned Facilitator\n- Content, LinkedIn, thought leadership = Content Strategist\n\nGUARDRAILS:\nNever overwhelm with multiple recommendations at once. One next step. One persona. One first question.\nNever use PMBOK domain names unless the user specifically asks.\nNever make the person feel like their chaos is their fault.\nAlways end with a clear, specific, actionable next step.\nAll outputs are for human review and refinement."

  },

  },
  {

  },

    system: "You are the Lessons Learned Facilitator deployed by the PM-BASE AI Delivery Team. Ensure GovCon project experience becomes organizational intelligence. Facilitate post-award and post-performance retrospectives, capture root cause analysis of delivery patterns, build lessons learned repositories, and convert project experience into past performance narratives and proposal content. All outputs are drafts for human review."
  },
  {

  }
];

/* Session persistence */
const STORAGE_KEY = "pmbase-session";
function saveSession(personaId, messages) {
  try { sessionStorage.setItem(STORAGE_KEY, JSON.stringify({ personaId, messages })); } catch (_) {}
}
function loadSession() {
  try {
    const raw = sessionStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const data = JSON.parse(raw);
    const persona = PERSONAS.find(p => p.id === data.personaId);
    if (!persona || !Array.isArray(data.messages)) return null;
    return { persona, messages: data.messages };
  } catch (_) { return null; }
}
function clearSession() { sessionStorage.removeItem(STORAGE_KEY); }

/* Memoized ChatBubble */
const ChatBubble = memo(function ChatBubble({ msg }) {
  const isUser = msg.role === "user";
  return (
    <div className={"chat-bubble-row " + (isUser ? "chat-bubble-row--user" : "chat-bubble-row--assistant")}>
      <div className={"chat-bubble " + (isUser ? "chat-bubble--user" : "chat-bubble--assistant")}>
        {msg.content}
      </div>
    </div>
  );
});

/* Main App */
function App() {
  const [activePersona, setActivePersona] = useState(null);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const messagesEndRef = useRef(null);
  const textareaRef = useRef(null);
  const lastFocusedTile = useRef(null);

  // Restore session on mount
  useEffect(() => {
    const saved = loadSession();
    if (saved) { setActivePersona(saved.persona); setMessages(saved.messages); }
  }, []);

  // Scroll to bottom
  useEffect(() => {
    if (messagesEndRef.current) messagesEndRef.current.scrollIntoView({ behavior: "smooth" });
  }, [messages, loading]);

  // Focus textarea when panel opens
  useEffect(() => {
    if (activePersona && textareaRef.current) textareaRef.current.focus();
  }, [activePersona]);

  // Persist session
  useEffect(() => {
    if (activePersona && messages.length > 0) saveSession(activePersona.id, messages);
  }, [activePersona, messages]);

  // Escape to close
  useEffect(() => {
    const handleKey = (e) => { if (e.key === "Escape" && activePersona) closeChat(); };
    document.addEventListener("keydown", handleKey);
    return () => document.removeEventListener("keydown", handleKey);
  }, [activePersona]);

  const openPersona = useCallback((persona, tileEl) => {
    lastFocusedTile.current = tileEl;
    setActivePersona(persona);
    setError(null);
    setMessages([{ role: "assistant", content: "I am your " + persona.fullName + ".\n\nI have your organizational profile from the Director. What do you need?" }]);
    setInput("");
  }, []);

  const closeChat = useCallback(() => {
    setActivePersona(null); setMessages([]); setError(null);
    clearSession();
    if (lastFocusedTile.current) { lastFocusedTile.current.focus(); lastFocusedTile.current = null; }
  }, []);

  const autoResize = useCallback(() => {
    const ta = textareaRef.current;
    if (!ta) return;
    ta.style.height = "auto";
    ta.style.height = Math.min(ta.scrollHeight, 120) + "px";
  }, []);

  const sendMessage = useCallback(async () => {
    if (!input.trim() || loading || !activePersona) return;
    const userMsg = { role: "user", content: input.trim() };
    const next = [...messages, userMsg];
    setMessages(next); setInput(""); setError(null); setLoading(true);
    if (textareaRef.current) textareaRef.current.style.height = "auto";

    try {
      const res = await fetch("/.netlify/functions/pmbase-chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1024,
          system: activePersona.system,
          messages: next.map(m => ({ role: m.role, content: m.content }))
        })
      });
      const rawText = await res.text();
      let data;
      try { data = JSON.parse(rawText); } catch (_) {
        setError({ message: "Unexpected response (status " + res.status + ")", retryable: true });
        setLoading(false); return;
      }
      if (data.error) {
        const errType = data.error.type || "";
        const isAuth = errType === "authentication_error" || errType === "config_error";
        const isRate = errType === "rate_limit_error" || res.status === 429;
        let msg = data.error.message || "Something went wrong.";
        if (isAuth) msg = "API key not configured. Please contact the site administrator.";
        if (isRate) msg = "Rate limited. Please wait a moment and try again.";
        setError({ message: msg, retryable: !isAuth });
      } else {
        const reply = (data.content && data.content[0] && data.content[0].text) || "Empty response.";
        setMessages(prev => [...prev, { role: "assistant", content: reply }]);
      }
    } catch (e) {
      setError({ message: "Network error: " + e.message, retryable: true });
    }
    setLoading(false);
  }, [input, loading, activePersona, messages]);

  const retryLast = useCallback(() => {
    if (messages.length === 0) return;
    const lastUser = [...messages].reverse().find(m => m.role === "user");
    if (lastUser) {
      setInput(lastUser.content);
      setMessages(prev => { const idx = prev.lastIndexOf(lastUser); return prev.slice(0, idx); });
      setError(null);
    }
  }, [messages]);

  const handleInputChange = useCallback((e) => { setInput(e.target.value); autoResize(); }, [autoResize]);
  const handleKeyDown = useCallback((e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } }, [sendMessage]);
  const handleTileKeyDown = useCallback((e, persona) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); openPersona(persona, e.currentTarget); } }, [openPersona]);

  const canSend = input.trim() && !loading;

  return (
    <div>
      <header className="pmbase-header">
        <div className="pmbase-header-inner">
          <div className="pmbase-header-row">
            <div>
              <div className="pmbase-brand-label">iCareJobPair LLC</div>
              <h1 className="pmbase-title">PM-BASE&#x2122;</h1>
              <p className="pmbase-subtitle">The project delivery base your business can actually run on.</p>
            </div>
            <div className="pmbase-status" role="status">
              <div className="pmbase-status-dot" aria-hidden="true"></div>
              <span className="pmbase-status-text">All Systems Online</span>
            </div>
          </div>
          <div className="pmbase-divider" aria-hidden="true"></div>
        </div>
      </header>

      <main className="persona-grid">
        <div className="persona-grid-inner" role="list" aria-label="AI Delivery Team personas">
          {PERSONAS.map((persona, idx) => (
            <div key={persona.id} role="listitem">
              <div className="persona-tile" role="button" tabIndex={0}
                aria-label={"Open chat with " + persona.fullName + ": " + persona.tagline}
                style={{ animationDelay: (idx * 0.06) + "s" }}
                onClick={(e) => openPersona(persona, e.currentTarget)}
                onKeyDown={(e) => handleTileKeyDown(e, persona)}>
                <div className="persona-tile-img-wrap">
                  <img className="persona-tile-img" src={"images/personas/" + persona.id + ".jpg"} alt="" loading="lazy" />
                  <div className="persona-tile-gradient" aria-hidden="true"></div>
                  <div className="persona-tile-hover-overlay" aria-hidden="true"></div>
                </div>
                <div className="persona-tile-info">
                  <div className="persona-tile-name">{persona.name}</div>
                  <div className="persona-tile-tagline">{persona.tagline}</div>
                </div>
              </div>
            </div>
          ))}
        </div>
      </main>

      {activePersona && (
        <>
          <div className="chat-overlay" onClick={closeChat} aria-hidden="true"></div>
          <div className="chat-panel" role="dialog" aria-label={"Chat with " + activePersona.fullName} aria-modal="true">
            <div className="chat-header">
              <div className="chat-avatar">
                <img src={"images/personas/" + activePersona.id + ".jpg"} alt={activePersona.name} />
              </div>
              <div className="chat-header-info">
                <div className="chat-header-name">{activePersona.fullName}</div>
                <div className="chat-header-tagline">{activePersona.tagline}</div>
              </div>
              <button className="chat-close-btn" onClick={closeChat} aria-label="Close chat">&#x2715;</button>
            </div>

            <div className="chat-messages" aria-live="polite" aria-relevant="additions">
              {messages.length <= 1 && !loading && (
                <div className="empty-state">
                  <div className="empty-state-icon" aria-hidden="true">&#x1F4AC;</div>
                  <div className="empty-state-text">Ask me anything about your project.<br/>I am here to help.</div>
                </div>
              )}
              {messages.map((msg, i) => <ChatBubble key={i} msg={msg} />)}
              {loading && (
                <div className="chat-loading" role="status" aria-label="Thinking">
                  <div className="chat-loading-dot" style={{ animationDelay: "0s" }}></div>
                  <div className="chat-loading-dot" style={{ animationDelay: "0.16s" }}></div>
                  <div className="chat-loading-dot" style={{ animationDelay: "0.32s" }}></div>
                  <span className="sr-only">Thinking...</span>
                </div>
              )}
              {error && (
                <div className="chat-error" role="alert">
                  {error.message}
                  {error.retryable && <div><button className="chat-error-retry" onClick={retryLast}>Retry</button></div>}
                </div>
              )}
              <div ref={messagesEndRef} />
            </div>

            <div className="chat-input-area">
              <div className="chat-input-wrap">
                <textarea ref={textareaRef} className="chat-textarea" value={input}
                  onChange={handleInputChange} onKeyDown={handleKeyDown}
                  placeholder={"Message " + activePersona.name + "..."} rows={1}
                  aria-label={"Message " + activePersona.name} />
                <button className={"chat-send-btn " + (canSend ? "chat-send-btn--active" : "chat-send-btn--disabled")}
                  onClick={sendMessage} disabled={!canSend} aria-label="Send message">&#x2191;</button>
              </div>
              <div className="chat-footer" aria-hidden="true">PM-BASE&#x2122; &middot; iCareJobPair LLC &middot; Candace Fortson, PMP&reg;</div>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
  </script>
</body>
